name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: cometvisu/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r cometvisu/utils/requirements.txt

      - name: Build CometVisu Demo
        run: |
          cd cometvisu
          npm ci
          sed -i 's/"qx.globalErrorHandling": true,/"qx.globalErrorHandling": false,/g' compile.json
          npx qx deploy --clean -t build -f=false --source-maps --save-source-in-map -o ../static/demo
          cp ../static/demo/resource/demo/visu_config_demo-tile.xml ../static/demo/resource/config/visu_config.xml

      - name: Build CometVisu Documentation
        run: |
          cd cometvisu
          VERSION=`./cv doc --get-version`
          VERSION_PATH=`./cv doc --get-target-version`
          ./cv doc -l de --doc-dir ../static/docs -f --target-version=${VERSION_PATH}
          ./cv doc -l en --doc-dir ../static/docs -f --target-version=${VERSION_PATH}
          CV_VERSION=$VERSION npx qx deploy --clean -t build --set apiviewer=true -f=false -o ../static/api
          ./cv doc --process-versions --doc-dir ../static/docs/

      - name: Resolve documentation version symlinks
        # `cv doc --process-versions` creates real symlinks (e.g. static/docs/de/latest -> 1.0)
        # to point "latest"/"develop" at the current version directory. Newer Hugo releases
        # (>=0.162) intentionally drop symlinked entries when reading directories for security
        # reasons, so they no longer get copied into `public/` during the static build.
        # Replace the symlinks with real directory copies so they survive the Hugo build
        # regardless of the Hugo version used.
        run: |
          find static/docs -type l | while read -r link; do
            target=$(readlink -f "$link")
            echo "Resolving symlink $link -> $target"
            rm "$link"
            cp -a "$target" "$link"
          done

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/Berlin
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
